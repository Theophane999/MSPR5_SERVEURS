apiVersion: 1

contactPoints:
  - orgId: 1
    name: FutureKawa Discord
    receivers:
      - uid: futurekawa-discord
        type: discord
        disableResolveMessage: false
        settings:
          url: ${https://discord.com/api/webhooks/1522356704182796332/2cez-QZKPL_E6dtlgYUWQdov5Xfzs9GEHFYv3tkM7Z8Sz5AJnoMLkeEFx7LbniOfkQxl}
          title: "[{{ .Status | toUpper }}] FutureKawa - {{ .CommonLabels.alertname }}"
          message: "{{ template \"default.message\" . }}"

policies:
  - orgId: 1
    receiver: FutureKawa Discord
    group_by:
      - grafana_folder
      - alertname
      - country
      - job
    group_wait: 30s
    group_interval: 2m
    repeat_interval: 15m
    routes:
      - receiver: FutureKawa Discord
        object_matchers:
          - [service, =, futurekawa]
