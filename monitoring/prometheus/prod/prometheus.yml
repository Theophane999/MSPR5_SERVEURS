global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend-mother
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend-mother:3000

  - job_name: backend-child
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend-child:3000
