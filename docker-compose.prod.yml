version: '3.9'

# -----------------------------------------------------------------------
# Environnement PRODUCTION — branche main
# Variables requises sur le serveur :
#   DEPLOY_TAG        = prod (ou le sha court du commit)
#   POSTGRES_PASSWORD = <secret>
#   MQTT_HOST         = <broker>
#   APP_CHILDREN      = brazil=http://...,ecuador=http://...,colombia=http://...
# -----------------------------------------------------------------------

services:

  # ── Base de données ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: futurekawa
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futurekawa"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futurekawa-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Backend Child (à déployer sur chaque serveur pays séparément) ──
  backend-child:
    image: futurekawa/backend-child:${DEPLOY_TAG:-prod}
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/futurekawa
      SPRING_DATASOURCE_USERNAME: futurekawa
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      MQTT_HOST: ${MQTT_HOST}
      APP_COUNTRY: ${APP_COUNTRY:-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - futurekawa-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"

  # ── Backend Mother ─────────────────────────────────────────────────
  backend-mother:
    image: futurekawa/backend-mother:${DEPLOY_TAG:-prod}
    restart: always
    environment:
      APP_CHILDREN_SERVICES: ${APP_CHILDREN:-brazil=http://backend-child:3000}
      APP_ALERT_THRESHOLD_TEMP_MIN: ${ALERT_TEMP_MIN:-15}
      APP_ALERT_THRESHOLD_TEMP_MAX: ${ALERT_TEMP_MAX:-30}
      APP_ALERT_THRESHOLD_HUMIDITE_MIN: ${ALERT_HUM_MIN:-45}
      APP_ALERT_THRESHOLD_HUMIDITE_MAX: ${ALERT_HUM_MAX:-75}
    depends_on:
      - backend-child
    ports:
      - "3200:3000"
    networks:
      - futurekawa-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    image: futurekawa/frontend:${DEPLOY_TAG:-prod}
    restart: always
    environment:
      BACKEND_MOTHER_URL: ${BACKEND_MOTHER_PUBLIC_URL:-http://backend-mother:3000}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend-mother
    networks:
      - futurekawa-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prod/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend-mother
      - backend-child
    networks:
      - futurekawa-net

  grafana:
    image: grafana/grafana-oss:11.1.4
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_FEATURE_TOGGLES_ENABLE: alerting
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - futurekawa-net

volumes:
  db-prod-data:
  prometheus-data:
  grafana-data:

networks:
  futurekawa-net:
    driver: bridge
