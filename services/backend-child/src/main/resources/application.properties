server.port=${PORT:3000}
app.country=${COUNTRY:Unknown}
app.entrepot-id=${ENTREPOT_ID:1}
app.mqtt.enabled=${MQTT_ENABLED:true}
app.mqtt.broker=${MQTT_BROKER:tcp://localhost:1883}
app.mqtt.interval-seconds=${MQTT_INTERVAL_SECONDS:300}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:futurekawa}
spring.datasource.username=${DB_USER:futurekawa}
spring.datasource.password=${DB_PASSWORD:futurekawa_pwd}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=0
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=backend-child
