# -----------------------------------------------------------------------
# Environnement PRE-PROD local (a lancer depuis la branche feature)
# Objectif: reproduire le flux prod avec 3 pays + backend mere + frontend
# -----------------------------------------------------------------------

services:
  db-brazil:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: futurekawa_brazil
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-futurekawa_pwd}
    volumes:
      - db-brazil-data:/var/lib/postgresql/data
      - ./services/backend-child/Bdd/MSPR5_BDD-1778060454.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futurekawa"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-ecuador:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: futurekawa_ecuador
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-futurekawa_pwd}
    volumes:
      - db-ecuador-data:/var/lib/postgresql/data
      - ./services/backend-child/Bdd/MSPR5_BDD-1778060454.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futurekawa"]
      interval: 10s
      timeout: 5s
      retries: 10

  db-colombia:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: futurekawa_colombia
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-futurekawa_pwd}
    volumes:
      - db-colombia-data:/var/lib/postgresql/data
      - ./services/backend-child/Bdd/MSPR5_BDD-1778060454.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futurekawa"]
      interval: 10s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"

  backend-child-brazil:
    build:
      context: ./services/backend-child
    image: futurekawa/backend-child:preprod-local
    restart: unless-stopped
    environment:
      PORT: 3000
      COUNTRY: Brazil
      ENTREPOT_ID: 1
      DB_HOST: db-brazil
      DB_PORT: 5432
      DB_NAME: futurekawa_brazil
      DB_USER: futurekawa
      DB_PASSWORD: ${POSTGRES_PASSWORD:-futurekawa_pwd}
      MQTT_BROKER: tcp://mosquitto:1883
      MQTT_INTERVAL_SECONDS: 300
    depends_on:
      - db-brazil
      - mosquitto
    ports:
      - "${CHILD_BRAZIL_HOST_PORT:-3101}:3000"

  backend-child-ecuador:
    build:
      context: ./services/backend-child
    image: futurekawa/backend-child:preprod-local
    restart: unless-stopped
    environment:
      PORT: 3000
      COUNTRY: Ecuador
      ENTREPOT_ID: 2
      DB_HOST: db-ecuador
      DB_PORT: 5432
      DB_NAME: futurekawa_ecuador
      DB_USER: futurekawa
      DB_PASSWORD: ${POSTGRES_PASSWORD:-futurekawa_pwd}
      MQTT_BROKER: tcp://mosquitto:1883
      MQTT_INTERVAL_SECONDS: 300
    depends_on:
      - db-ecuador
      - mosquitto
    ports:
      - "${CHILD_ECUADOR_HOST_PORT:-3102}:3000"

  backend-child-colombia:
    build:
      context: ./services/backend-child
    image: futurekawa/backend-child:preprod-local
    restart: unless-stopped
    environment:
      PORT: 3000
      COUNTRY: Colombia
      ENTREPOT_ID: 3
      DB_HOST: db-colombia
      DB_PORT: 5432
      DB_NAME: futurekawa_colombia
      DB_USER: futurekawa
      DB_PASSWORD: ${POSTGRES_PASSWORD:-futurekawa_pwd}
      MQTT_BROKER: tcp://mosquitto:1883
      MQTT_INTERVAL_SECONDS: 300
    depends_on:
      - db-colombia
      - mosquitto
    ports:
      - "${CHILD_COLOMBIA_HOST_PORT:-3103}:3000"

  backend-mother:
    build:
      context: ./services/backend-mother
    image: futurekawa/backend-mother:preprod-local
    restart: unless-stopped
    environment:
      PORT: 3000
      CHILDREN_SERVICES: brazil=http://backend-child-brazil:3000,ecuador=http://backend-child-ecuador:3000,colombia=http://backend-child-colombia:3000
    depends_on:
      - backend-child-brazil
      - backend-child-ecuador
      - backend-child-colombia
    ports:
      - "${MOTHER_HOST_PORT:-3200}:3000"

  frontend:
    build:
      context: ./services/frontend
    image: futurekawa/frontend:preprod-local
    restart: unless-stopped
    environment:
      BACKEND_MOTHER_PUBLIC_URL: http://localhost:3200
    depends_on:
      - backend-mother
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"

volumes:
  db-brazil-data:
  db-ecuador-data:
  db-colombia-data:
